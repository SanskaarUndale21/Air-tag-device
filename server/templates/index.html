<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindIt — GPS Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #060d1a;
      --bg-card:     #0a1525;
      --bg-hover:    #0f1e35;
      --border:      #162748;
      --border-hi:   #1e3558;
      --accent:      #00e5a0;
      --accent-dim:  rgba(0,229,160,0.10);
      --accent-glow: rgba(0,229,160,0.30);
      --text:        #e2e8f0;
      --text-muted:  #8899aa;
      --text-faint:  #4a6080;
      --red:         #ef4444;
      --red-dim:     rgba(239,68,68,0.10);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100%;
    }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Navbar ── */
    .nav {
      height: 52px; flex-shrink: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 200;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 17px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.18em;
    }
    .tag {
      font-size: 10px; padding: 2px 8px; border-radius: 99px;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--accent-glow); font-weight: 500;
      letter-spacing: 0.04em;
    }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    #conn-dot  { width: 7px; height: 7px; border-radius: 50%; background: #475569; }
    #conn-text { font-size: 12px; color: #64748b; font-weight: 500; }

    /* ── Layout ── */
    .body-wrap { flex: 1; display: flex; min-height: 0; }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px; flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .section { padding: 16px; border-bottom: 1px solid var(--border); }

    .dev-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .dev-name { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }
    .last-seen { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-faint); }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 99px;
      font-size: 10px; font-weight: 700;
      font-family: 'Space Mono', monospace; letter-spacing: 0.12em;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .badge-tracking {
      background: var(--accent-dim); border: 1px solid var(--accent-glow); color: var(--accent);
    }
    .badge-tracking .badge-dot { background: var(--accent); animation: blink 1.5s ease infinite; }
    .badge-outrange {
      background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); color: #f87171;
    }
    .badge-outrange .badge-dot { background: var(--red); }
    .badge-offline {
      background: rgba(100,116,139,0.08); border: 1px solid rgba(100,116,139,0.2); color: #64748b;
    }
    .badge-offline .badge-dot { background: #475569; }

    /* Stats */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px;
    }
    .stat.wide { grid-column: 1 / -1; }
    .stat-lbl {
      font-size: 9px; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px;
    }
    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700; color: var(--text);
    }
    .stat-unit { font-size: 10px; color: var(--text-faint); font-weight: 400; margin-left: 3px; }

    /* Find button */
    .find-btn {
      width: 100%; padding: 17px 20px; border-radius: 12px; border: none; outline: none;
      font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'Space Mono', monospace; cursor: pointer; transition: all 0.2s;
    }
    .find-btn.idle {
      background: var(--accent); color: #060d1a;
      box-shadow: 0 0 22px rgba(0,229,160,0.38);
    }
    .find-btn.idle:hover:not(:disabled) {
      box-shadow: 0 0 34px rgba(0,229,160,0.58); transform: translateY(-1px);
    }
    .find-btn.ringing {
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid var(--accent); animation: glow-pulse 1.5s ease infinite;
    }
    .find-btn:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; box-shadow: none; }

    /* Geofence */
    .slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .slider-lbl { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; }
    .slider-val { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
    .slider-val.ok  { color: var(--accent); }
    .slider-val.err { color: #f87171; }
    .geofence-hint { font-size: 10px; color: var(--text-faint); margin-top: 5px; }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    /* Action buttons */
    .act-row { display: flex; gap: 8px; }
    .act-btn {
      flex: 1; padding: 9px 10px; border-radius: 9px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
      font-family: inherit;
    }
    .act-btn.full { width: 100%; margin-bottom: 8px; }
    .act-btn:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); }
    .act-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .act-btn.ok-flash { color: var(--accent); border-color: var(--accent-glow); }

    /* Map */
    .map-wrap { flex: 1; position: relative; min-width: 0; }
    #map { width: 100%; height: 100%; background: var(--bg-card); }
    .coord-box {
      position: absolute; bottom: 16px; right: 16px; z-index: 500;
      background: rgba(6,13,26,0.88); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 14px;
      backdrop-filter: blur(8px); pointer-events: none; display: none;
    }
    .coord-main { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); line-height: 1.5; }
    .coord-sub  { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-faint); margin-top: 1px; }

    /* History panel */
    .hist-panel { display: none; border-top: 1px solid var(--border); background: var(--bg); max-height: 260px; overflow: auto; flex-shrink: 0; }
    .hist-panel.open { display: block; }
    .hist-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 18px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg);
    }
    .hist-title { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .hist-close { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 15px; line-height: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      text-align: left; padding: 8px 16px;
      color: var(--text-faint); font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.1em; font-weight: 600; border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 16px; border-bottom: 1px solid rgba(22,39,72,0.4); }
    tr:hover td { background: rgba(22,39,72,0.4); }
    .tc  { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 11px; }
    .tm  { font-family: 'Space Mono', monospace; color: var(--text-muted); font-size: 11px; }
    .tf  { font-family: 'Space Mono', monospace; color: var(--text-faint); font-size: 11px; }

    /* Leaflet overrides */
    .leaflet-container { background: var(--bg-card) !important; }
    .leaflet-control-attribution { background: rgba(6,13,26,0.85) !important; color: #4a6080 !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: #4a6080 !important; }
    .leaflet-control-zoom a { background: var(--bg-card) !important; color: var(--accent) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-card); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    /* Animations */
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.5)} }
    @keyframes glow-pulse {
      0%,100%{ box-shadow: 0 0 14px rgba(0,229,160,.4), 0 0 28px rgba(0,229,160,.2); }
      50%    { box-shadow: 0 0 26px rgba(0,229,160,.7), 0 0 52px rgba(0,229,160,.35); }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .body-wrap { flex-direction: column; }
      .sidebar { width: 100%; max-height: 52vh; border-right: none; border-bottom: 1px solid var(--border); }
      .map-wrap { min-height: 280px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="nav">
  <div class="nav-left">
    <span class="logo">FINDIT</span>
    <span class="tag">GPS TRACKER</span>
  </div>
  <div class="nav-right">
    <div id="conn-dot"></div>
    <span id="conn-text">Connecting...</span>
  </div>
</nav>

<!-- Body -->
<div class="body-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Device header -->
    <div class="section">
      <div class="dev-header">
        <span class="dev-name" id="dev-name">My Tracker</span>
        <span class="badge badge-offline" id="status-badge">
          <span class="badge-dot"></span>
          <span id="status-text">NO SIGNAL</span>
        </span>
      </div>
      <div class="last-seen" id="last-seen">Waiting for data...</div>
    </div>

    <!-- Stats -->
    <div class="section">
      <div class="stats">
        <div class="stat">
          <div class="stat-lbl">Latitude</div>
          <div class="stat-val" id="s-lat">--</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Longitude</div>
          <div class="stat-val" id="s-lng">--</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Altitude</div>
          <div class="stat-val" id="s-alt">--<span class="stat-unit">m</span></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Satellites</div>
          <div class="stat-val" id="s-sats">--<span class="stat-unit">sats</span></div>
        </div>
        <div class="stat wide">
          <div class="stat-lbl">Distance from Home</div>
          <div class="stat-val" id="s-dist" style="font-size:13px">No home set</div>
        </div>
      </div>
    </div>

    <!-- Find My Device -->
    <div class="section">
      <button class="find-btn idle" id="find-btn" onclick="toggleFind()" disabled>
        ◉&nbsp; FIND MY DEVICE
      </button>
    </div>

    <!-- Geofence -->
    <div class="section">
      <div class="slider-row">
        <span class="slider-lbl">Geo-fence Radius</span>
        <span class="slider-val ok" id="radius-val">300 m</span>
      </div>
      <input type="range" id="geo-slider" min="50" max="1000" step="50" value="300" oninput="onRadiusChange(this.value)">
      <div class="geofence-hint" id="geo-hint">Set home to enable geo-fence</div>
    </div>

    <!-- Actions -->
    <div class="section">
      <button class="act-btn full" id="home-btn" onclick="setHome()" disabled>
        🏠&nbsp; Set Current Location as Home
      </button>
      <div class="act-row">
        <button class="act-btn" id="copy-btn" onclick="copyCoords()" disabled>⧉ Copy Coords</button>
        <button class="act-btn" id="maps-btn" onclick="openMaps()" disabled>↗ Google Maps</button>
      </div>
    </div>

    <!-- History toggle -->
    <div class="section" style="border-bottom:none">
      <button class="act-btn full" id="hist-toggle" onclick="toggleHistory()">
        📋&nbsp; Show Location History
      </button>
    </div>

  </aside>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="coord-box" id="coord-box">
      <div class="coord-main" id="coord-main">--</div>
      <div class="coord-sub"  id="coord-sub">--</div>
    </div>
  </div>

</div>

<!-- History panel -->
<div class="hist-panel" id="hist-panel">
  <div class="hist-bar">
    <span class="hist-title">Location History</span>
    <button class="hist-close" onclick="toggleHistory()">✕</button>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>Time</th><th>Latitude</th><th>Longitude</th><th>Altitude</th><th>Sats</th></tr>
    </thead>
    <tbody id="hist-body">
      <tr><td colspan="6" style="text-align:center;color:#4a6080;padding:24px;font-size:13px">No history yet</td></tr>
    </tbody>
  </table>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────
const POLL_MS       = 2000;
const SIG_TIMEOUT   = 30000;
const K_HOME        = 'findit_home';
const K_RADIUS      = 'findit_radius';
const K_NAME        = 'findit_name';

// ── State ────────────────────────────────────────────────────────────────
let map, devMarker, homeMarker, geoCircle;
let lastData = null, lastDataAt = null;
let home = null, radius = 300;
let findActive = false, histOpen = false, firstFix = true;

// ── Boot ─────────────────────────────────────────────────────────────────
function boot() {
  const sh = localStorage.getItem(K_HOME);
  const sr = localStorage.getItem(K_RADIUS);
  const sn = localStorage.getItem(K_NAME);
  if (sh) home = JSON.parse(sh);
  if (sr) { radius = parseInt(sr); el('geo-slider').value = radius; }
  if (sn) el('dev-name').textContent = sn;
  refreshRadiusLabel();

  map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20,
  }).addTo(map);

  if (home) drawHome(home.lat, home.lng);

  poll();
  setInterval(poll, POLL_MS);
  setInterval(sigCheck, 5000);
}

// ── Poll ─────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch('/api/status');
    if (!r.ok) return;
    const d = await r.json();
    if (d.lat !== null && d.lng !== null) {
      applyData(d);
      lastDataAt = Date.now();
    }
  } catch (_) {}
}

// ── Apply data ───────────────────────────────────────────────────────────
function applyData(d) {
  lastData = d;
  findActive = d.find;

  el('s-lat').textContent  = fc(d.lat);
  el('s-lng').textContent  = fc(d.lng);
  el('s-alt').innerHTML    = `${d.alt.toFixed(1)}<span class="stat-unit">m</span>`;
  el('s-sats').innerHTML   = `${d.sats}<span class="stat-unit">sats</span>`;

  if (d.last_seen) {
    const t = new Date(d.last_seen);
    el('last-seen').textContent = 'Updated ' + t.toLocaleTimeString('en-US', { hour12: false });
  }

  const dist = home ? haversine(d.lat, d.lng, home.lat, home.lng) : null;
  el('s-dist').textContent = dist !== null ? fdist(dist) : 'No home set';

  el('coord-main').textContent = `${fc(d.lat)},  ${fc(d.lng)}`;
  el('coord-sub').textContent  = `Alt ${d.alt.toFixed(0)} m  ·  ${d.sats} sats`;
  el('coord-box').style.display = 'block';

  const out = dist !== null && dist > radius;
  setStatus(out ? 'out' : 'tracking');
  refreshRadiusLabel(dist);

  // Enable buttons
  ['find-btn','home-btn','copy-btn','maps-btn'].forEach(id => el(id).disabled = false);

  const btn = el('find-btn');
  if (findActive) {
    btn.className = 'find-btn ringing';
    btn.textContent = '⟳  STOP FINDING';
  } else {
    btn.className = 'find-btn idle';
    btn.textContent = '◉  FIND MY DEVICE';
  }

  updateMap(d.lat, d.lng);
  if (out) refreshCircle();
}

// ── Map ───────────────────────────────────────────────────────────────────
function devIcon() {
  return L.divIcon({
    html: `<div style="width:36px;height:36px;position:relative;display:flex;align-items:center;justify-content:center">
      <div style="position:absolute;width:36px;height:36px;border-radius:50%;border:2px solid #00e5a0;background:rgba(0,229,160,.1);animation:dp 1.5s cubic-bezier(0,0,.2,1) infinite"></div>
      <div style="width:14px;height:14px;border-radius:50%;background:#00e5a0;box-shadow:0 0 12px rgba(0,229,160,.8);z-index:1;position:relative"></div>
      <style>@keyframes dp{0%{transform:scale(1);opacity:.9}100%{transform:scale(2.2);opacity:0}}</style>
    </div>`,
    className: '', iconSize: [36, 36], iconAnchor: [18, 18],
  });
}

function homeIcon() {
  return L.divIcon({
    html: `<div style="width:30px;height:30px;border-radius:8px;background:rgba(251,191,36,.15);border:2px solid #fbbf24;display:flex;align-items:center;justify-content:center;font-size:14px">🏠</div>`,
    className: '', iconSize: [30, 30], iconAnchor: [15, 15],
  });
}

function updateMap(lat, lng) {
  if (!devMarker) {
    devMarker = L.marker([lat, lng], { icon: devIcon() }).addTo(map);
  } else {
    devMarker.setLatLng([lat, lng]);
  }
  if (firstFix) { map.setView([lat, lng], 16); firstFix = false; }
  else map.panTo([lat, lng], { animate: true, duration: 0.8 });
  refreshCircle();
}

function drawHome(lat, lng) {
  if (homeMarker) map.removeLayer(homeMarker);
  homeMarker = L.marker([lat, lng], { icon: homeIcon() }).addTo(map);
  refreshCircle();
}

function refreshCircle() {
  if (!map || !home) {
    if (geoCircle) { map.removeLayer(geoCircle); geoCircle = null; }
    return;
  }
  const out = lastData ? haversine(lastData.lat, lastData.lng, home.lat, home.lng) > radius : false;
  const col  = out ? '#ef4444' : '#00e5a0';
  const opts = { radius, color: col, fillColor: col, fillOpacity: .04, weight: 1.5, dashArray: '6 4' };
  if (!geoCircle) {
    geoCircle = L.circle([home.lat, home.lng], opts).addTo(map);
  } else {
    geoCircle.setLatLng([home.lat, home.lng]);
    geoCircle.setRadius(radius);
    geoCircle.setStyle({ color: col, fillColor: col });
  }
}

// ── Status ────────────────────────────────────────────────────────────────
function setStatus(s) {
  const badge = el('status-badge');
  const txt   = el('status-text');
  badge.className = 'badge';
  const dot = el('conn-dot'), lbl = el('conn-text');
  if (s === 'tracking') {
    badge.classList.add('badge-tracking'); txt.textContent = 'TRACKING';
    dot.style.background = '#00e5a0'; lbl.style.color = '#00e5a0'; lbl.textContent = 'Live';
  } else if (s === 'out') {
    badge.classList.add('badge-outrange'); txt.textContent = 'OUT OF RANGE';
    dot.style.background = '#ef4444'; lbl.style.color = '#f87171'; lbl.textContent = 'Out of range';
  } else {
    badge.classList.add('badge-offline'); txt.textContent = 'NO SIGNAL';
    dot.style.background = '#475569'; lbl.style.color = '#64748b'; lbl.textContent = 'No signal';
  }
}

function sigCheck() {
  if (lastDataAt && Date.now() - lastDataAt > SIG_TIMEOUT) setStatus('offline');
}

// ── Actions ───────────────────────────────────────────────────────────────
async function toggleFind() {
  findActive = !findActive;
  try {
    await fetch('/api/find', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: findActive }),
    });
  } catch (_) {}
  const btn = el('find-btn');
  if (findActive) {
    btn.className = 'find-btn ringing';
    btn.textContent = '⟳  STOP FINDING';
  } else {
    btn.className = 'find-btn idle';
    btn.textContent = '◉  FIND MY DEVICE';
  }
}

function setHome() {
  if (!lastData) return;
  home = { lat: lastData.lat, lng: lastData.lng };
  localStorage.setItem(K_HOME, JSON.stringify(home));
  drawHome(home.lat, home.lng);
  el('s-dist').textContent = '0 m';
  el('geo-hint').textContent = 'Geo-fence active';
}

function copyCoords() {
  if (!lastData) return;
  navigator.clipboard.writeText(`${lastData.lat.toFixed(6)}, ${lastData.lng.toFixed(6)}`);
  const b = el('copy-btn');
  b.textContent = '✓ Copied!'; b.classList.add('ok-flash');
  setTimeout(() => { b.textContent = '⧉ Copy Coords'; b.classList.remove('ok-flash'); }, 2000);
}

function openMaps() {
  if (!lastData) return;
  window.open(`https://maps.google.com/?q=${lastData.lat},${lastData.lng}`, '_blank');
}

function onRadiusChange(v) {
  radius = parseInt(v);
  localStorage.setItem(K_RADIUS, v);
  refreshRadiusLabel(lastData && home ? haversine(lastData.lat, lastData.lng, home.lat, home.lng) : null);
  refreshCircle();
}

function refreshRadiusLabel(dist = null) {
  const out = dist !== null && dist > radius;
  const lbl = el('radius-val');
  lbl.textContent = radius >= 1000 ? `${(radius/1000).toFixed(1)} km` : `${radius} m`;
  lbl.className   = 'slider-val ' + (out ? 'err' : 'ok');
  el('geo-slider').style.accentColor = out ? '#ef4444' : '#00e5a0';
  if (home) {
    el('geo-hint').textContent = out ? '⚠ Device outside geo-fence!' : '✓ Device inside geo-fence';
    el('geo-hint').style.color = out ? '#f87171' : '#4a6080';
  }
}

// ── History ───────────────────────────────────────────────────────────────
async function toggleHistory() {
  histOpen = !histOpen;
  el('hist-panel').className = 'hist-panel' + (histOpen ? ' open' : '');
  el('hist-toggle').textContent = histOpen ? '📋  Hide History' : '📋  Show Location History';
  if (histOpen) await loadHistory();
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history');
    const rows = await r.json();
    if (!rows.length) {
      el('hist-body').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#4a6080;padding:20px">No history yet</td></tr>';
      return;
    }
    el('hist-body').innerHTML = rows.map((e, i) => {
      const t = new Date(e.recorded_at);
      return `<tr>
        <td class="tf">${i+1}</td>
        <td class="tm">${t.toLocaleDateString()} ${t.toLocaleTimeString('en-US',{hour12:false})}</td>
        <td class="tc">${e.lat.toFixed(6)}</td>
        <td class="tc">${e.lng.toFixed(6)}</td>
        <td class="tm">${e.alt.toFixed(1)} m</td>
        <td class="tm">${e.sats}</td>
      </tr>`;
    }).join('');
  } catch (_) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function haversine(la1, lo1, la2, lo2) {
  const R = 6371000;
  const p1 = la1*Math.PI/180, p2 = la2*Math.PI/180;
  const dp = (la2-la1)*Math.PI/180, dl = (lo2-lo1)*Math.PI/180;
  const a  = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fdist(m) { return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`; }
function fc(v)    { return v.toFixed(6); }

boot();
</script>
